<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroQuiz Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div id="scr-menu" class="screen active">
            <h2 style="text-align:center;">✈️ AeroQuiz</h2>
            <div class="search-section">
                <input type="text" id="inp-search" placeholder="Search Code, Name or Stock..." oninput="searchMaster()">
                <div id="search-dropdown"></div>
            </div>
            <button class="btn-main" onclick="startMission('domestic')">🇮🇳 Indian Airports</button>
            <button class="btn-main" style="background:#2563eb" onclick="startMission('intl')">🌍 International</button>
            <button class="btn-menu" onclick="startAirlineMission()">AIRLINE MISSION</button>
        </div>

        <div id="scr-game" class="screen">
            <div class="hud">
                <span><b>Q:</b> <span id="hud-q">0</span>/20</span>
                <button onclick="location.reload()" style="border:none; background:#fee2e2; color:#ef4444; padding:5px 10px; border-radius:8px; cursor:pointer;">EXIT</button>
                <span><b>PTS:</b> <span id="hud-p">0</span></span>
            </div>
            <div class="timer-wrap"><div id="timer-bar"></div></div>
            <div class="q-image-box" id="q-img-cont"></div>
            <h2 id="q-text" style="text-align:center;">---</h2>
            <div id="opt-grid" class="options-grid"></div>
            <p id="feedback" style="text-align:center; font-weight:bold; margin-top:15px;"></p>
        </div>

        <div id="scr-res" class="screen">
            <div style="text-align:center;">
                <h2>MISSION COMPLETE</h2>
                <h1 id="res-score" style="font-size:3rem; color:#3b82f6; margin:10px 0;">0</h1>
                <p id="res-acc"></p>
                <button class="btn-main" onclick="location.reload()">PLAY AGAIN</button>
            </div>
        </div>
    </div>

    <audio id="aud-ok" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="aud-no" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
